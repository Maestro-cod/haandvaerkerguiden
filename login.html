<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – HåndværkerGuiden</title>
  <style>
    /* Change ADMIN_PASSWORD below to whatever you want */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 60%, #0c1a30 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      text-align: center;
    }
    .login-logo { font-size: 2.8rem; margin-bottom: 8px; }
    .login-title { font-size: 1.5rem; font-weight: 800; color: #1a1a2e; margin-bottom: 4px; }
    .login-sub { font-size: .9rem; color: #6b7280; margin-bottom: 32px; }

    .form-group { text-align: left; margin-bottom: 18px; }
    .form-group label { display: block; font-size: .85rem; font-weight: 600; color: #1a1a2e; margin-bottom: 6px; }
    .form-group input {
      width: 100%; padding: 12px 16px; border: 1.5px solid #e5e7eb;
      border-radius: 10px; font-size: 1rem; outline: none; transition: border-color .15s;
    }
    .form-group input:focus { border-color: #f59e0b; box-shadow: 0 0 0 3px rgba(245,158,11,.1); }

    .btn-login {
      width: 100%; padding: 14px; background: #f59e0b; color: #0f172a;
      border: none; border-radius: 10px; font-size: 1rem; font-weight: 800;
      cursor: pointer; transition: background .15s; margin-top: 8px;
    }
    .btn-login:hover { background: #d97706; }

    .error-msg { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; border-radius: 8px; padding: 10px 14px; font-size: .88rem; margin-top: 16px; display: none; }
    .back-link { display: block; margin-top: 20px; font-size: .85rem; color: #6b7280; }
    .back-link a { color: #1a56db; font-weight: 600; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">🔧</div>
  <div class="login-title">Admin Login</div>
  <div class="login-sub">HåndværkerGuiden Danmark — Admin</div>

  <div class="form-group">
    <label>Password</label>
    <input type="password" id="pwd" placeholder="Indtast admin password" onkeydown="if(event.key==='Enter')doLogin()" autofocus />
  </div>

  <button class="btn-login" onclick="doLogin()">Log ind →</button>
  <div class="error-msg" id="err">Forkert password. Prøv igen.</div>
  <div class="back-link"><a href="index.html">← Tilbage til siden</a></div>
</div>

<script>
  // ⚠️  SKIFT DETTE PASSWORD — det er kun gemt lokalt i browseren
  const ADMIN_PASSWORD = 'admin2026';

  function doLogin() {
    const pwd = document.getElementById('pwd').value;
    const err = document.getElementById('err');
    if (pwd === ADMIN_PASSWORD) {
      sessionStorage.setItem('hg_admin', 'true');
      window.location.href = 'admin.html';
    } else {
      err.style.display = 'block';
      document.getElementById('pwd').value = '';
      document.getElementById('pwd').focus();
    }
  }
</script>
</body>
</html>
